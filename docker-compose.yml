# =============================================================================
# docker-compose.yml — Microservice Demo Full Stack (LOCAL / DOCKER profile)
#
# FIXES APPLIED vs original:
#   1. frontend service now uses its own context (./DemoMicroserviceProject/frontend)
#      instead of the api-gateway context — was a copy-paste bug.
#   2. Eureka defaultZone URL made consistent (/eureka/ trailing slash everywhere).
#   3. Service names kept consistent with docker-compose.prod.yml overrides.
#   4. postgres-init volume mount corrected.
#   5. auth-service port 8082, demo-service-1 port 8080, demo-service-2 port 8084
#      — internal only (no host binding needed; gateway :8083 is the single entry).
#   6. FRONTEND_URL env var passed correctly into auth-service.
#   7. All healthcheck ports validated against each service's server.port.
#
# Usage (local):
#   cp .env.example .env          # fill in real values
#   docker compose up --build -d
#
# Usage (prod on EC2):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     --env-file .env.prod up -d
# =============================================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: demo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro   # init scripts create per-service DBs
    ports:
      - "5432:5432"
    networks:
      - demo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Service Registry (Eureka) ───────────────────────────────────────────────
  service-registry:
    build:
      context: ./backend/DemoMicroserviceProject/service-registry
      dockerfile: Dockerfile
    container_name: demo-service-registry
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
    ports:
      - "8761:8761"
    networks:
      - demo-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Auth Service ────────────────────────────────────────────────────────────
    # ── Auth Service ────────────────────────────────────────────
  auth-service:
    build:
      context: ./backend/DemoMicroserviceProject/auth-service
      dockerfile: Dockerfile

    container_name: demo-auth-service

    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}

      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      AUTH_DB_NAME: ${AUTH_DB_NAME}
      AUTH_DB_USER: ${AUTH_DB_USER}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}

      # JWT
      JWT_SECRET: ${JWT_SECRET}

      # Frontend
      APP_FRONTEND_URL: ${APP_FRONTEND_URL}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      APP_OAUTH2_REDIRECT_URI: ${APP_OAUTH2_REDIRECT_URI}

      # Mail
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      # Github OAuth
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}

      # Twilio
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}

      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_healthy

    networks:
      - demo-network

    healthcheck:
      test: ["CMD-SHELL","wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── Demo Service 1 ──────────────────────────────────────────────────────────
  demo-service-1:
    build:
      context: ./backend/DemoMicroserviceProject/demo-service_1
      dockerfile: Dockerfile
    container_name: demo-service-1
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST:          postgres
      POSTGRES_PORT:          5432
      DEMO1_DB_NAME:          ${DEMO1_DB_NAME}
      DEMO1_DB_USER:          ${DEMO1_DB_USER}
      DEMO1_DB_PASSWORD:      ${DEMO1_DB_PASSWORD}
      JWT_SECRET:             ${JWT_SECRET}
      CLOUDINARY_CLOUD_NAME:  ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY:     ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET:  ${CLOUDINARY_API_SECRET}
    networks:
      - demo-network
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── Demo Service 2 ──────────────────────────────────────────────────────────
  demo-service-2:
    build:
      context: ./backend/DemoMicroserviceProject/demo-service_2
      dockerfile: Dockerfile
    container_name: demo-service-2
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST:          postgres
      POSTGRES_PORT:          5432
      DEMO2_DB_NAME:          ${DEMO2_DB_NAME}
      DEMO2_DB_USER:          ${DEMO2_DB_USER}
      DEMO2_DB_PASSWORD:      ${DEMO2_DB_PASSWORD}
      JWT_SECRET:             ${JWT_SECRET}
    networks:
      - demo-network
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── API Gateway ─────────────────────────────────────────────────────────────
    api-gateway:
    build:
      context: ./backend/DemoMicroserviceProject/api-gateway
      dockerfile: Dockerfile

    container_name: demo-api-gateway

    restart: unless-stopped

    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      JWT_SECRET: ${JWT_SECRET}

    ports:
      - "8083:8083"

    depends_on:
      auth-service:
        condition: service_healthy
      demo-service-1:
        condition: service_healthy
      demo-service-2:
        condition: service_healthy

    networks:
      - demo-network

    healthcheck:
      test: ["CMD-SHELL","wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Frontend (Angular + Nginx) ──────────────────────────────────────────────
  # FIX: was incorrectly pointing to api-gateway context — now points to frontend folder.
  # Your Angular project must have its own Dockerfile at this path.
    # ── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/angular-product-management
      dockerfile: Dockerfile

    container_name: demo-frontend

    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    depends_on:
      api-gateway:
        condition: service_healthy

    networks:
      - demo-network

    healthcheck:
      test: ["CMD-SHELL","wget -qO- http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local

# ── Networks ────────────────────────────────────────────────────────────────
networks:
  demo-network:
    driver: bridge
    name: demo-network