# =============================================================================
# docker-compose.yml
# Microservice Demo — Full Stack
#
# Services:
#   postgres         — PostgreSQL 16 :5432
#   service-registry — Eureka Server :8761
#   auth-service     — Auth + JWT :8082
#   demo-service-1   — Demo Service 1 :8080
#   demo-service-2   — Demo Service 2 :8084
#   api-gateway      — Spring Cloud Gateway :8083
#   frontend         — Angular + Nginx :80
# =============================================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: demo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       postgres
      AUTH_DB_NAME:      ${AUTH_DB_NAME}
      AUTH_DB_USER:      ${AUTH_DB_USER}
      AUTH_DB_PASSWORD:  ${AUTH_DB_PASSWORD}
      DEMO1_DB_NAME:     ${DEMO1_DB_NAME}
      DEMO1_DB_USER:     ${DEMO1_DB_USER}
      DEMO1_DB_PASSWORD: ${DEMO1_DB_PASSWORD}
      DEMO2_DB_NAME:     ${DEMO2_DB_NAME}
      DEMO2_DB_USER:     ${DEMO2_DB_USER}
      DEMO2_DB_PASSWORD: ${DEMO2_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - demo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Service Registry (Eureka) ───────────────────────────────────────────────
  service-registry:
    build:
      context: ./DemoMicroserviceProject/service-registry
      dockerfile: Dockerfile
    container_name: demo-service-registry
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
    ports:
      - "8761:8761"
    networks:
      - demo-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Auth Service ────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ./DemoMicroserviceProject/auth-service
      dockerfile: Dockerfile
    container_name: demo-auth-service
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST:          postgres
      POSTGRES_PORT:          5432
      AUTH_DB_NAME:           ${AUTH_DB_NAME}
      AUTH_DB_USER:           ${AUTH_DB_USER}
      AUTH_DB_PASSWORD:       ${AUTH_DB_PASSWORD}
      JWT_SECRET:             ${JWT_SECRET}
      MAIL_HOST:              ${MAIL_HOST}
      MAIL_PORT:              ${MAIL_PORT}
      MAIL_USERNAME:          ${MAIL_USERNAME}
      MAIL_PASSWORD:          ${MAIL_PASSWORD}
      TWILIO_ACCOUNT_SID:     ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN:      ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER:    ${TWILIO_PHONE_NUMBER}
      CLOUDINARY_CLOUD_NAME:  ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY:     ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET:  ${CLOUDINARY_API_SECRET}
      GOOGLE_CLIENT_ID:       ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET:   ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID:       ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET:   ${GITHUB_CLIENT_SECRET}
      FRONTEND_URL:           ${FRONTEND_URL}
    networks:
      - demo-network
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── Demo Service 1 ──────────────────────────────────────────────────────────
  demo-service-1:
    build:
      context: ./DemoMicroserviceProject/demo-service_1
      dockerfile: Dockerfile
    container_name: demo-service-1
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST:          postgres
      POSTGRES_PORT:          5432
      DEMO1_DB_NAME:          ${DEMO1_DB_NAME}
      DEMO1_DB_USER:          ${DEMO1_DB_USER}
      DEMO1_DB_PASSWORD:      ${DEMO1_DB_PASSWORD}
      JWT_SECRET:             ${JWT_SECRET}
      CLOUDINARY_CLOUD_NAME:  ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY:     ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET:  ${CLOUDINARY_API_SECRET}
    networks:
      - demo-network
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── Demo Service 2 ──────────────────────────────────────────────────────────
  demo-service-2:
    build:
      context: ./DemoMicroserviceProject/demo-service_2
      dockerfile: Dockerfile
    container_name: demo-service-2
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST:          postgres
      POSTGRES_PORT:          5432
      DEMO2_DB_NAME:          ${DEMO2_DB_NAME}
      DEMO2_DB_USER:          ${DEMO2_DB_USER}
      DEMO2_DB_PASSWORD:      ${DEMO2_DB_PASSWORD}
      JWT_SECRET:             ${JWT_SECRET}
    networks:
      - demo-network
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── API Gateway ─────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./DemoMicroserviceProject/api-gateway
      dockerfile: Dockerfile
    container_name: demo-api-gateway
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      JWT_SECRET:             ${JWT_SECRET}
    ports:
      - "8083:8083"
    networks:
      - demo-network
    depends_on:
      auth-service:
        condition: service_healthy
      demo-service-1:
        condition: service_healthy
      demo-service-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./DemoMicroserviceProject/api-gateway
      dockerfile: Dockerfile
    container_name: demo-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - demo-network
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres-data:

networks:
  demo-network:
    driver: bridge
    name: demo-network