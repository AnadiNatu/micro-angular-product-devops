# =============================================================================
# docker-compose.prod.yml  — AWS EC2 production override
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#          --env-file .env.prod up -d
# =============================================================================

services:

  postgres:
    deploy:
      replicas: 0   # disabled — RDS handles it

  service-registry:
    environment:
      SPRING_PROFILES_ACTIVE: prod
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  auth-service:
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  demo-service-1:
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  demo-service-2:
    environment:
      SPRING_PROFILES_ACTIVE: prod
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  api-gateway:
    environment:
      SPRING_PROFILES_ACTIVE: prod
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  frontend:
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"

volumes:
  postgres-data:
    external: false