# ============================================================
# frontend/nginx.conf
# Place this file at: frontend/nginx.conf
# ============================================================
#
# This Nginx config does 3 things:
# 1. Serves the Angular SPA static files
# 2. Handles Angular routing (all non-asset requests → index.html)
# 3. Proxies /api/** calls to the api-gateway container
# ============================================================

server {
    listen 80;
    server_name _;

    # Serve static Angular files
    root /usr/share/nginx/html;
    index index.html;

    # ─── Gzip compression ────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ─── Security headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── API proxy → api-gateway ──────────────────────────────
    # All /api/** requests are forwarded to the gateway container.
    # "api-gateway" is the Docker Compose service name — Docker's
    # internal DNS resolves it automatically inside the network.
    location /api/ {
        proxy_pass http://api-gateway:8083;

        # Pass real client info to backend
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings (important for slow Eureka lookups on startup)
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer settings
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ─── OAuth2 proxy (auth-service OAuth2 flows) ─────────────
    location /oauth2/ {
        proxy_pass http://api-gateway:8083;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /login/ {
        proxy_pass http://api-gateway:8083;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Static assets — long cache ───────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Angular SPA routing — CRITICAL ───────────────────────
    # Any route that doesn't match a file on disk gets index.html.
    # This is what makes Angular router work on hard reload.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Actuator / health (optional — expose gateway health) ─
    location /actuator/ {
        proxy_pass http://api-gateway:8083;
        proxy_set_header Host $host;
    }
}
