# ================================================================
#  API GATEWAY — PROD PROFILE (AWS EC2 + RDS)
# ================================================================
spring.application.name=api-gateway
server.port=8083

jwt.secret=${JWT_SECRET}

# ── Eureka ───────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://service-registry:8761/eureka/
eureka.instance.prefer-ip-address=true

# ── Gateway ──────────────────────────────────────────────────────
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ── CORS ─────────────────────────────────────────────────────────
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=${FRONTEND_URL}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=false

# ── Actuator ─────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ── Logging (minimal in prod) ─────────────────────────────────────
logging.level.root=WARN
logging.level.com.microservice_demo.api_gateway=INFO