# ================================================================
#  API GATEWAY — PROD PROFILE (AWS EC2)
#  FRONTEND_URL must be your real production domain, e.g. https://myapp.com
# ================================================================
spring.application.name=api-gateway
server.port=8083

# ── JWT ──────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ── Eureka ───────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://service-registry:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ── Gateway ──────────────────────────────────────────────────────
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ── CORS (locked to production frontend domain) ───────────────────
# allowed-origins cannot be wildcard (*) in prod — lock to your domain.
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=${FRONTEND_URL}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=false

# ── Actuator (minimal surface in prod) ───────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.gateway.enabled=false
management.endpoint.health.show-details=when-authorized

# ── AWS region (used for any SDK calls from gateway) ─────────────
cloud.aws.region.static=${AWS_REGION:us-east-1}
cloud.aws.stack.auto=false

# ── Logging (minimal in prod) ─────────────────────────────────────
logging.level.root=WARN
logging.level.org.springframework.cloud.gateway=WARN
logging.level.reactor.netty=WARN
logging.level.com.microservice_demo.api_gateway=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n