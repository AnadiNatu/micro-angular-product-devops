# =============================================================================
# api-gateway/src/main/resources/application-prod.properties
# PROFILE: prod  —  AWS EC2 + RDS deployment
# Secrets injected via .env.prod or AWS Secrets Manager
# =============================================================================

server.port=8080
spring.application.name=api-gateway

# ── Gateway Routes (same docker service names — same compose file used on EC2)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://auth-service:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=question-service
spring.cloud.gateway.routes[1].uri=http://question-service:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/questions/**

spring.cloud.gateway.routes[2].id=quiz-service
spring.cloud.gateway.routes[2].uri=http://quiz-service:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/quiz/**,/api/leaderboard/**

spring.cloud.gateway.routes[3].id=notification-service
spring.cloud.gateway.routes[3].uri=http://notification-service:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/notify/**

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ── Eureka — disabled in prod (direct routing) ───────────────────────────────
eureka.client.enabled=false

# ── CORS (your EC2 public IP or domain) ──────────────────────────────────────
# Replace with your actual domain or EC2 IP
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://${EC2_PUBLIC_IP},https://${DOMAIN_NAME}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=false

# ── Actuator (restrict in prod) ───────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Logging (reduce verbosity in prod) ───────────────────────────────────────
logging.level.root=WARN
logging.level.com.example=INFO
