# ================================================================
#  API GATEWAY — DOCKER PROFILE
#  Secrets injected from docker-compose.yml → .env
#  Eureka = service-registry (compose service name)
# ================================================================
spring.application.name=api-gateway
server.port=8083

# ── JWT ──────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ── Eureka ───────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://service-registry:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ── Gateway discovery (manual routes in GatewayConfig.java) ──────
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ── CORS ─────────────────────────────────────────────────────────
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=false

# ── Actuator ─────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true
management.endpoint.health.show-details=always

# ── Logging ──────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.org.springframework.cloud.gateway=INFO
logging.level.reactor.netty=WARN
logging.level.com.microservice_demo.api_gateway=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n