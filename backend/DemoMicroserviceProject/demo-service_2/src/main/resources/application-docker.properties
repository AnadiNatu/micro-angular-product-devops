# ================================================================
#  DEMO SERVICE 2 — DOCKER PROFILE
#  Secrets injected from docker-compose.yml → .env
# ================================================================
spring.application.name=demo-service2
server.port=8084

# ── Datasource ───────────────────────────────────────────────────
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${DEMO2_DB_NAME}
spring.datasource.username=${DEMO2_DB_USER}
spring.datasource.password=${DEMO2_DB_PASSWORD}

# ── JPA ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ──────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ── Eureka ───────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://service-registry:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ── Actuator ─────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── Resilience4j ─────────────────────────────────────────────────
resilience4j.circuitbreaker.instances.demoService1.sliding-window-size=10
resilience4j.circuitbreaker.instances.demoService1.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.demoService1.wait-duration-in-open-state=10000
resilience4j.retry.instances.demoService1.max-attempts=3
resilience4j.retry.instances.demoService1.wait-duration=1000

# ── Logging ──────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.microservice_demo.demo_service_2=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

spring.datasource.hikari.initialization-fail-timeout=600000
spring.datasource.hikari.connection-timeout=300000

app.frontend.url=
app.cors.allowed-origins=
app.oauth2.redirect-uri=
