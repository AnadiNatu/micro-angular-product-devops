# ================================================================
#  AUTH SERVICE — PROD PROFILE (AWS EC2 + RDS PostgreSQL)
#
#  Loaded via:  docker compose -f docker-compose.yml \
#                              -f docker-compose.prod.yml \
#                              --env-file .env.prod up -d
#
#  POSTGRES_HOST = RDS endpoint (e.g. mydb.xxxx.us-east-1.rds.amazonaws.com)
#  POSTGRES_PORT = 5432
#  All other secrets live in .env.prod on the EC2 instance — never committed.
# ================================================================
spring.application.name=auth-service
server.port=8082

# ── Datasource (RDS) ─────────────────────────────────────────────
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${AUTH_DB_NAME}
spring.datasource.username=${AUTH_DB_USER}
spring.datasource.password=${AUTH_DB_PASSWORD}

# ── Connection pool (HikariCP) — tuned for RDS latency ───────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ──────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ── Mail ─────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Twilio ────────────────────────────────────────────────────────
twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.phone-number=${TWILIO_PHONE_NUMBER}

# ── Cloudinary ───────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ── AWS S3 (for file uploads / profile pictures) ──────────────────
# Credentials are picked up automatically via EC2 IAM Instance Role.
# If not using Instance Role, set AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
# in .env.prod and Spring Cloud AWS will auto-detect them.
cloud.aws.region.static=${AWS_REGION:us-east-1}
cloud.aws.stack.auto=false
# S3 bucket name injected from .env.prod
app.s3.bucket=${S3_BUCKET_NAME}

# ── OAuth2 ───────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}

# ── Frontend URL (production domain) ─────────────────────────────
app.frontend.url=${FRONTEND_URL}

# ── Spring Session (JDBC — same RDS instance) ─────────────────────
spring.session.store-type=jdbc
spring.session.jdbc.initialize-schema=always
spring.session.timeout=2592000s

# ── OTP ──────────────────────────────────────────────────────────
otp.expiry-minutes=5

# ── Eureka (all services on same EC2 host or internal VPC) ───────
eureka.client.service-url.defaultZone=http://service-registry:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ── Actuator (restricted surface in prod) ─────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ── Logging (minimal prod noise) ─────────────────────────────────
logging.level.root=WARN
logging.level.com.microservice_demo.auth_service=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n