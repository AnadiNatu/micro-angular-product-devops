# =============================================================================
# auth-service/src/main/resources/application-prod.properties
# PROFILE: prod — AWS EC2 + RDS PostgreSQL
# =============================================================================

server.port=8081
spring.application.name=auth-service

# ── AWS RDS PostgreSQL ────────────────────────────────────────────────────────
# POSTGRES_HOST = your RDS endpoint from .env.prod
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${AUTH_DB_NAME}?sslmode=require
spring.datasource.username=${AUTH_DB_USER}
spring.datasource.password=${AUTH_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── Connection Pool (tuned for RDS) ──────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# Use 'validate' in prod — schema managed by Flyway or initial RDS setup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ── Mail ──────────────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Eureka ────────────────────────────────────────────────────────────────────
eureka.client.enabled=false

# ── Actuator (restricted in prod) ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.example=INFO
