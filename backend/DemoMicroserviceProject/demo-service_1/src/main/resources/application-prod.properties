# ============================================================
# auth-service/src/main/resources/application-prod.properties
# Profile: prod
# USE FOR: AWS EC2 + RDS deployment.
# HOST = RDS endpoint from environment variable RDS_ENDPOINT.
# NO secrets in this file — all come from .env.prod via Docker.
# ============================================================

# ─── Database — AWS RDS ────────────────────────────────────────
# RDS_ENDPOINT is injected from .env.prod
# Example: your-db.xxxx.ap-south-1.rds.amazonaws.com
spring.datasource.url=jdbc:postgresql://${RDS_ENDPOINT}:${RDS_PORT:5432}/auth_db
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Production connection pool — larger for prod load
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# ─── Hibernate DDL — NEVER use create/drop in production! ──────
# "validate" checks schema matches entities without changing anything.
# Run a migration tool (Flyway/Liquibase) for schema changes in prod.
# For initial deployment, use "update" then switch to "validate".
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── Spring Session ────────────────────────────────────────────
spring.session.jdbc.initialize-schema=always

# ─── Eureka — service-registry container ───────────────────────
eureka.client.service-url.defaultZone=http://service-registry:8761/eureka/
eureka.instance.prefer-ip-address=true

# ─── OAuth2 — PRODUCTION redirect URIs ─────────────────────────
# Register these URIs in Google Console and GitHub OAuth App:
#   https://yourdomain.com/login/oauth2/code/google
#   https://yourdomain.com/login/oauth2/code/github
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email

# ─── Frontend URL — your real domain ───────────────────────────
app.frontend-url=${FRONTEND_URL:https://yourdomain.com}

# ─── Upload folder ─────────────────────────────────────────────
app.upload-folder=/app/uploads/

# ─── Logging — minimal in prod ─────────────────────────────────
logging.level.root=ERROR
logging.level.com.microservice_demo.auth_service=WARN
logging.level.org.springframework.security=ERROR

# ─── Actuator — restricted in prod ─────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
