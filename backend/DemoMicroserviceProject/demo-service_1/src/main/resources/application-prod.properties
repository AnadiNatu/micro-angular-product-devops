# ================================================================
#  DEMO SERVICE 1 — PROD PROFILE (AWS EC2 + RDS PostgreSQL)
#  POSTGRES_HOST = RDS endpoint from .env.prod
# ================================================================
spring.application.name=demo-service1
server.port=8080

# ── Datasource (RDS) ─────────────────────────────────────────────
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${DEMO1_DB_NAME}
spring.datasource.username=${DEMO1_DB_USER}
spring.datasource.password=${DEMO1_DB_PASSWORD}

# ── Connection pool (HikariCP) — tuned for RDS ───────────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ──────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ── Cloudinary ───────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ── AWS S3 ────────────────────────────────────────────────────────
cloud.aws.region.static=${AWS_REGION:us-east-1}
cloud.aws.stack.auto=false
app.s3.bucket=${S3_BUCKET_NAME}

# ── Eureka ───────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://service-registry:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ── Actuator ─────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ── Resilience4j ─────────────────────────────────────────────────
resilience4j.circuitbreaker.instances.demoService2.sliding-window-size=10
resilience4j.circuitbreaker.instances.demoService2.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.demoService2.wait-duration-in-open-state=10000
resilience4j.retry.instances.demoService2.max-attempts=3
resilience4j.retry.instances.demoService2.wait-duration=1000

# ── Logging ──────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.microservice_demo.demo_service_1=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

spring.datasource.hikari.initialization-fail-timeout=60000
#spring.datasource.hikari.connection-timeout=30000

app.frontend.url=
app.cors.allowed-origins=
app.oauth2.redirect-uri=