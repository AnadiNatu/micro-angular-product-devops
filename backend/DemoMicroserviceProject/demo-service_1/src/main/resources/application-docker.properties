# ============================================================
# auth-service/src/main/resources/application-docker.properties
# Profile: docker
# USE FOR: Running inside Docker Compose (local Docker dev).
# HOST = "postgres" (the Docker Compose service name — Docker DNS resolves it)
# ============================================================

# ─── Database — Docker Compose PostgreSQL container ────────────
# "postgres" = Docker Compose service name — resolves via Docker DNS
spring.datasource.url=jdbc:postgresql://postgres:5432/auth_db
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ─── Hibernate DDL ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ─── Spring Session JDBC ───────────────────────────────────────
spring.session.jdbc.initialize-schema=always

# ─── Eureka — service-registry container ───────────────────────
# "service-registry" = Docker Compose service name
eureka.client.service-url.defaultZone=http://service-registry:8761/eureka/
eureka.instance.prefer-ip-address=true

# ─── OAuth2 ────────────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email

# ─── Frontend URL ──────────────────────────────────────────────
app.frontend-url=${FRONTEND_URL:http://localhost}

# ─── Upload folder inside container ────────────────────────────
app.upload-folder=/app/uploads/

# ─── Logging ───────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.microservice_demo.auth_service=INFO
logging.level.org.springframework.security=WARN
