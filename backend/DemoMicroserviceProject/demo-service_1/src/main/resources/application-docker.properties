# ================================================================
#  DEMO SERVICE 1 — DOCKER PROFILE
#  Secrets injected from docker-compose.yml → .env
#  DB host = postgres (compose service name)
# ================================================================
spring.application.name=demo-service1
server.port=8080

# ── Datasource ───────────────────────────────────────────────────
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${DEMO1_DB_NAME}
spring.datasource.username=${DEMO1_DB_USER}
spring.datasource.password=${DEMO1_DB_PASSWORD}

# ── JPA ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# ── JWT ──────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ── Cloudinary ───────────────────────────────────────────────────
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ── Eureka ───────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://service-registry:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# ── Actuator ─────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ── Resilience4j ─────────────────────────────────────────────────
resilience4j.circuitbreaker.instances.demoService2.sliding-window-size=10
resilience4j.circuitbreaker.instances.demoService2.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.demoService2.wait-duration-in-open-state=10000
resilience4j.retry.instances.demoService2.max-attempts=3
resilience4j.retry.instances.demoService2.wait-duration=1000

# ── Logging ──────────────────────────────────────────────────────
logging.level.root=WARN
logging.level.com.microservice_demo.demo_service_1=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.connection-timeout=30000